<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart - Nephron-X</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f8f9fa;
            --text-main: #212529;
            --text-muted: #6c757d;
            --card-bg: #ffffff;
            --navbar-bg: #ffffff;
            --shadow-card: 0 10px 30px rgba(0,0,0,0.05);
            /* CHANGED TO ORANGE */
            --title-color: #fd7e14; 
            --font-heading: 'Montserrat', sans-serif;
        }
        [data-theme="dark"] {
            --bg-body: #121212;
            --text-main: #e0e0e0;
            --text-muted: #b2bec3;
            --card-bg: #1e1e1e;
            --navbar-bg: #1e1e1e;
            --shadow-card: 0 10px 30px rgba(0,0,0,0.5);
            /* CHANGED TO ORANGE */
            --title-color: #fd7e14;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            transition: all 0.3s ease;
        }
        
        .navbar { 
            background: var(--navbar-bg); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
        }
        
        .cart-card { 
            border: none; 
            border-radius: 20px; 
            box-shadow: var(--shadow-card); 
            background: var(--card-bg); 
            margin-bottom: 20px; 
        }
        
        .cart-img { width: 80px; height: 80px; object-fit: cover; border-radius: 15px; }
        
        /* General Orange Button Style */
        .checkout-btn, .btn-primary { 
            background-color: #fd7e14; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            padding: 10px 15px;
            transition: background-color 0.2s;
        }
        
        .checkout-btn { width: 100%; padding: 15px; }
        
        .checkout-btn:hover, .btn-primary:hover {
            background-color: #e36a0d;
            color: white;
        }

        .brand-heading { font-family: var(--font-heading); font-weight: 700; color: var(--text-main); }
        
        /* Text Color Fixes */
        h4, h5, span { color: var(--text-main); }
        .text-muted { color: var(--text-muted) !important; }
        .text-primary { color: var(--title-color) !important; } /* Force primary text to orange */
        .navbar-brand { color: var(--title-color) !important; }

        .theme-btn {
            position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px;
            border-radius: 50%; z-index: 1000; display: flex; align-items: center; justify-content: center;
            box-shadow: var(--shadow-card); border: none; font-size: 1.5rem;
            background: var(--card-bg); color: var(--text-main);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-light px-4 mb-5">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1 brand-heading">Nephron-X Cart</span>
            <a href="{% url 'shop' %}" class="btn btn-outline-secondary btn-sm rounded-pill px-3">Continue Shopping</a>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-lg-8">
                <h4 class="mb-4 brand-heading">Your Items</h4>
                {% for item in cart_items %}
                <div class="cart-card p-3 d-flex align-items-center">
                    <img src="{{ item.image_url }}" class="cart-img me-3">
                    <div class="flex-grow-1">
                        <h5 class="mb-1 fw-bold">{{ item.product_name }}</h5>
                        <p class="mb-0 text-muted small">${{ item.price }} x {{ item.quantity }}</p>
                    </div>
                    <div class="text-end">
                        <h5 class="fw-bold text-success mb-1">${{ item.total_price }}</h5>
                        <!-- REMOVE BUTTON -->
                        <a href="{% url 'remove_cart_item' item.id %}" class="btn btn-sm btn-outline-danger border-0 py-0 px-2" style="font-size: 0.8rem;">
                            <i class="bi bi-trash"></i> Remove
                        </a>
                    </div>
                </div>
                {% empty %}
                <div class="text-center py-5 text-muted">
                    <h4>Your cart is empty.</h4>
                    <a href="{% url 'shop' %}" class="btn btn-primary mt-3">Go to Shop</a>
                </div>
                {% endfor %}
            </div>
            
            <div class="col-lg-4">
                <div class="cart-card p-4">
                    <h5 class="brand-heading mb-4">Order Summary</h5>
                    <div class="d-flex justify-content-between mb-3">
                        <span>Subtotal</span>
                        <span class="fw-bold">${{ total_price }}</span>
                    </div>
                    <hr style="border-color: var(--text-muted);">
                    <div class="d-flex justify-content-between mb-4 fs-5">
                        <span class="fw-bold">Total</span>
                        <span class="fw-bold text-success">${{ total_price }}</span>
                    </div>
                    <button class="checkout-btn" onclick="alert('Proceeding to Payment Gateway...')">Checkout Now</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Theme Toggle -->
    <button class="theme-btn" id="themeToggle"><i class="bi bi-moon-fill" id="themeIcon"></i></button>

    <script>
        const toggleBtn = document.getElementById('themeToggle');
        const icon = document.getElementById('themeIcon');
        const html = document.documentElement;

        if(localStorage.getItem('theme') === 'dark') {
            html.setAttribute('data-theme', 'dark');
            icon.classList.replace('bi-moon-fill', 'bi-sun-fill');
        }

        toggleBtn.addEventListener('click', () => {
            if(html.getAttribute('data-theme') === 'dark') {
                html.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                icon.classList.replace('bi-sun-fill', 'bi-moon-fill');
            } else {
                html.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                icon.classList.replace('bi-moon-fill', 'bi-sun-fill');
            }
        });
    </script>
</body>
</html>
