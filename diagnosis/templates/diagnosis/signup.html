<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Nephron-X</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #ffffff;
            --text-main: #2d3436;
            --card-bg: #ffffff;
            --input-bg: #f8f9fa;
            --shadow-card: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
        }
        [data-theme="dark"] {
            --bg-body: #121212;
            --text-main: #dfe6e9;
            --card-bg: #1e1e1e;
            --input-bg: #2d3436;
            --shadow-card: 0 20px 25px -5px rgba(0,0,0,0.8);
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease;
        }
        .auth-card {
            border: none; border-radius: 30px;
            box-shadow: var(--shadow-card);
            background-color: var(--card-bg); padding: 50px;
            width: 100%; max-width: 450px;
        }
        .auth-title { font-family: 'Montserrat', sans-serif; color: #0d6efd; font-weight: 800; text-align: center; margin-bottom: 30px; }
        .form-control { border-radius: 15px; padding: 0.8rem 1rem; background-color: var(--input-bg); border: 1px solid rgba(0,0,0,0.1); color: var(--text-main); }
        .btn-xl { padding: 12px; border-radius: 50px; font-weight: 700; font-family: 'Montserrat', sans-serif; box-shadow: 0 10px 20px rgba(13, 110, 253, 0.3); }
        
        /* Fix for Django form paragraphs */
        form p { margin-bottom: 15px; }
        form label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; opacity: 0.8; }
        form input { display: block; width: 100%; padding: 0.8rem 1rem; font-size: 1rem; border-radius: 15px; border: 1px solid rgba(0,0,0,0.1); background-color: var(--input-bg); color: var(--text-main); }
        .helptext { display: none; }
        ul { list-style: none; padding: 0; color: #dc3545; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2 class="auth-title">Join Nephron-X</h2>
        <form method="POST">
            {% csrf_token %}
            <!-- CRITICAL: THIS RENDERS THE INPUTS -->
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100 btn-xl mt-3">Sign Up</button>
        </form>
        <div class="text-center mt-4">
            <p class="text-muted">Already have an account? <a href="/login/" class="text-primary fw-bold text-decoration-none">Login</a></p>
            <a href="/" class="text-secondary small text-decoration-none">← Back to Home</a>
        </div>
    </div>
    <script>
        if(localStorage.getItem('theme') === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); }
    </script>
</body>
</html>
